<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технические работы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5efe7;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .message {
            background: white;
            border-radius: 32px;
            padding: 45px 30px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .emoji {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }

        h2 {
            color: #b87a4b;
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        p {
            color: #5a4a38;
            line-height: 1.5;
            margin-top: 15px;
        }

        .small {
            color: #b8a688;
            font-size: 0.8rem;
            margin-top: 25px;
        }
    </style>
</head>
<body>
    <div class="message">
        <div class="emoji">🌿</div>
        <h2>Скоро вернёмся</h2>
        <p>На сайте ведутся технические работы.<br>Пожалуйста, загляните позже.</p>
        <p class="small">Булат & Екатерина ❤️</p>
    </div>
</body>
</html>
